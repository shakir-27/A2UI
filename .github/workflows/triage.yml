# This automation adds/removes the 'triage: flag' label to issues and PRs,
# making sure that this label is assigned to:
#
# 1. Open issues, without ‘triage: waiting-for-user-response’ that are:
#    1. without priority
#    2. P0 and P1 without assignment
#    3. P0 and stale for more than 1 day
#    4. P1 and stale for more than 30 days
#    5. P2 and stale for more than 90 days
# 2. Open PRs stale for more than a day
# 3. External comments, not responded for more than a day
#
# "Stale" is measured from the last human comment or update,
# not from `updated_at`, so the bot's own label edits and comments
# don't reset the clock. The label is fully owned by this
# automation and is removed once an item
# no longer matches any rule.
#
# Every time the script flags or unflags an issue or PR,
# it will also post a comment on the item to let the user know
# why the label has been added or removed.

name: Flag/Unflag issues and PRs

on:
  # Periodic reconciliation: catches time-based rules (staleness, unanswered
  # external comments) and removes the label once an item no longer matches.
  schedule:
    - cron: "0 15 * * *" # daily at 15:00 UTC (07:00 PST), start of the team's day
  # React promptly to the events that can change an item's flag state.
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, unassigned, reopened]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review, synchronize]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Reconcile triage flag labels
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const path = require('path');
            const { pathToFileURL } = require('url');

            const filePath = path.resolve('./scripts/triage.mjs');
            const fileUrl = pathToFileURL(filePath).href;

            const importedModule = await import(fileUrl);
            await importedModule.default({ github, context });
